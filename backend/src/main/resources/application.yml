spring:
  datasource:
    url: jdbc:mysql://localhost:3306/products?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        #       show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

file:
  dir: C:/upload/item-images/

watermark:
  path: C:/upload/watermark/logo.png

logging:
  level:
    org.hibernate.SQL: debug
#    org.hibernate.type: trace